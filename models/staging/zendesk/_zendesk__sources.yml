version: 2

sources:
  - name: zendesk
    description: "Tabelas bronze do Zendesk no domínio WILD_CARD. Em desenvolvimento, os modelos podem alternar para seeds equivalentes."
    database: "{{ target.database }}"
    schema: bronze
    config:
      loaded_at_field: _snowflake_loaded_at
      freshness:
        warn_after: {count: 12, period: hour}
        error_after: {count: 24, period: hour}
    tables:
      - name: zendesk_groups
        description: "Tabela bronze com grupos do Zendesk em RAW_DATA VARIANT."
      - name: zendesk_organizations
        description: "Tabela bronze com organizações do Zendesk em RAW_DATA VARIANT."
      - name: zendesk_users
        description: "Tabela bronze com usuários do Zendesk em RAW_DATA VARIANT."
      - name: zendesk_ticket_fields
        description: "Tabela bronze com definição de campos de ticket do Zendesk."
      - name: zendesk_tickets
        description: "Tabela bronze com tickets do Zendesk."
      - name: zendesk_tickets_events
        description: "Tabela bronze com audits e child_events dos tickets."
      - name: zendesk_ticket_metrics
        description: "Tabela bronze legada de métricas de ticket."
      - name: zendesk_ticket_metrics_full
        description: "Tabela bronze com metric_sets completos e confiáveis."
